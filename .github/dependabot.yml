# Dependency security updates (S7). Weekly PRs for vulnerable / outdated deps.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Bundle minor/patch bumps so we get one PR, not a flood.
      minor-and-patch:
        update-types: ["minor", "patch"]
    labels:
      - "dependencies"
      - "security"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
