name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Strip server-only files (the static export can't include them)
        run: rm -rf app/api app/auth app/login app/note middleware.ts
      - name: Build static demo
        env:
          GHPAGES: "true"
          PAGES_BASE_PATH: "/${{ github.event.repository.name }}"
          NEXT_PUBLIC_DEMO: "true"
        run: npm run build
      - run: touch out/.nojekyll
      - uses: actions/upload-pages-artifact@v5
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
